# Timeline Test Encounter
# 测试各种 AOE 机制：扇形连斩、左右刀、吸引、钢铁月环、十字斩、追击

arena:
  name: Timeline Test Arena
  shape: circle
  radius: 15
  boundary: wall

boss:
  name: Test Boss
  type: boss
  hp: 85000
  attack: 1
  speed: 4
  size: 1.5
  autoAttackRange: 5
  facing: 180

player:
  hp: 50000
  mp: 10000
  attack: 1000
  speed: 5
  size: 0.5
  autoAttackRange: 5
  position: { x: 0, y: -12, z: 0 }

boss_ai:
  chaseRange: 5
  autoAttackRange: 15
  autoAttackInterval: 3000
  aggroRange: 8

# Skills (all inline, referenced by id in timeline)
skills:
  fan_s:
    name: 扇形斬・前
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: fixed, angle: 180 }
        shape: { type: fan, radius: 15, angle: 90 }
        resolveDelay: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  fan_w:
    name: 扇形斬・右
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: fixed, angle: 270 }
        shape: { type: fan, radius: 15, angle: 90 }
        resolveDelay: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  fan_n:
    name: 扇形斬・後
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: fixed, angle: 0 }
        shape: { type: fan, radius: 15, angle: 90 }
        resolveDelay: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  fan_e:
    name: 扇形斬・左
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: fixed, angle: 90 }
        shape: { type: fan, radius: 15, angle: 90 }
        resolveDelay: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  lr_cleave:
    name: 左右開弓
    type: spell
    castTime: 5000
    targetType: aoe
    zones:
      # Left 180°: telegraph from start, resolves at 5s
      - anchor: { type: caster }
        direction: { type: fixed, angle: 90 }
        shape: { type: fan, radius: 15, angle: 180 }
        resolveDelay: 5000
        telegraphBefore: 5000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }
      # Right 180°: telegraph 4s before resolve, resolves at 7s
      - anchor: { type: caster }
        direction: { type: fixed, angle: 270 }
        shape: { type: fan, radius: 15, angle: 180 }
        resolveDelay: 7000
        telegraphBefore: 4000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  pull_cast:
    name: 引力冲击
    type: spell
    castTime: 5000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 20 }
        resolveDelay: 5000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 2000 }
          - { type: knockback, distance: 10, source: { type: caster } }
        displacementHint: knockback

  iron_lunar:
    name: 钢铁月环
    type: spell
    castTime: 5000
    targetType: aoe
    zones:
      # Lunar Dynamo (ring): telegraph at 3s, resolves at 8s
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: ring, innerRadius: 6, outerRadius: 16 }
        resolveDelay: 5000
        telegraphBefore: 5000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }
      # Iron Chariot (circle): resolves at 5s
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 6 }
        resolveDelay: 8000
        telegraphBefore: 5000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  pull_instant:
    name: 引力牵拉
    type: ability
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 20 }
        resolveDelay: 0
        hitEffectDuration: 300
        effects:
          - { type: pull, distance: 99, source: { type: caster } }
        displacementHint: pull

  cross_cut:
    name: 十字斩
    type: spell
    castTime: 5000
    targetType: aoe
    zones:
      # Vertical (N→S)
      - anchor: { type: position, x: 0, y: 15 }
        direction: { type: fixed, angle: 180 }
        shape: { type: rect, length: 30, width: 4 }
        resolveDelay: 5000
        telegraphBefore: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }
      # Horizontal (W→E)
      - anchor: { type: position, x: -15, y: 0 }
        direction: { type: fixed, angle: 90 }
        shape: { type: rect, length: 30, width: 4 }
        resolveDelay: 5000
        telegraphBefore: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  boss_front:
    name: 前方斩击
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: caster_facing }
        shape: { type: fan, radius: 30, angle: 180 }
        resolveDelay: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 20000 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  boss_auto:
    name: 攻击
    type: ability
    targetType: single
    requiresTarget: true
    range: 15
    effects: [{ type: damage, potency: 1000 }]

  arena_pulse:
    name: 震撼登场
    type: spell
    castTime: 2000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 99 }
        resolveDelay: 2000
        hitEffectDuration: 500
        effects: [{ type: damage, potency: 16700 }]

  enrage:
    name: 时间的尽头
    type: spell
    castTime: 10000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 99 }
        resolveDelay: 10000
        hitEffectDuration: 500
        effects: [{ type: damage, potency: 999999999 }]

# Timeline (boss actions after combat starts)
timeline:
  # Phase 0 (0-10s): boss chases and auto-attacks
  - at: 0
    action: enable_ai

  # Phase 0→1 transition: teleport back to center, disable AI
  - at: 10000
    action: disable_ai
  - at: 10000
    action: teleport
    position: { x: 0, y: 0 }
  - at: 10000
    action: lock_facing
    facing: 180

  # 衝撃波: full-screen AOE, deals 1/3 HP, teaches player to heal
  - at: 11000
    use: arena_pulse

  # Phase 1 (14-26s): clockwise fans
  - at: 14000
    use: fan_s
  - at: 17000
    use: fan_w
  - at: 20000
    use: fan_n
  - at: 23000
    use: fan_e

  # Phase 2 (28-35s): left-right cleave
  - at: 28000
    use: lr_cleave

  # Phase 3 (37-51s): pull → iron chariot + lunar dynamo
  - at: 37000
    use: pull_cast
  - at: 43000
    use: iron_lunar

  # Phase 4 (52-57s): instant pull + cross cut
  - at: 52000
    use: pull_instant
  - at: 52000
    use: cross_cut

  # Phase 5 (59s): enable AI, boss hunts player
  - at: 59000
    action: enable_ai

  # Phase 6 (64s): boss front cleave from current position
  - at: 64000
    use: boss_front

  # Phase 7 (72s): teleport to center, enrage
  - at: 72000
    action: disable_ai
  - at: 72000
    action: teleport
    position: { x: 0, y: 0 }
  - at: 72000
    action: lock_facing
    facing: 180
  - at: 72500
    use: enrage
