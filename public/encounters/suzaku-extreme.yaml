# 小怪阶段副本（Phase 系统版）
# phase_default: Boss 开场AOE → 4小怪
# phase_boss_return: 小怪全灭后 Boss 复归，每5s释放AOE

arena:
  name: 试炼场
  shape: circle
  radius: 15
  boundary: wall

# --- 统一实体定义 ---
entities:
  boss:
    type: boss
    group: boss
    hp: 60000
    attack: 1
    speed: 4
    size: 1.5
    facing: 180
    autoAttackRange: 5
    aggroRange: 8
  mob_nw:
    type: mob
    group: adds_wave1
    hp: 5000
    attack: 1
    speed: 0
    size: 0.6
    visible: false
    targetable: false
  mob_ne:
    type: mob
    group: adds_wave1
    hp: 5000
    attack: 1
    speed: 0
    size: 0.6
    visible: false
    targetable: false
  mob_se:
    type: mob
    group: adds_wave1
    hp: 5000
    attack: 1
    speed: 0
    size: 0.6
    visible: false
    targetable: false
  mob_sw:
    type: mob
    group: adds_wave1
    hp: 5000
    attack: 1
    speed: 0
    size: 0.6
    visible: false
    targetable: false

player:
  position: { x: 0, y: -12, z: 0 }

boss_ai:
  chaseRange: 5
  autoAttackRange: 15
  autoAttackInterval: 3000
  aggroRange: 8

# --- 技能定义 ---
skills:
  boss_auto:
    name: 攻击
    type: ability
    targetType: single
    requiresTarget: true
    range: 15
    effects: [{ type: damage, potency: 300 }]

  arena_blast:
    name: 震撼登场
    type: spell
    castTime: 2000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 99 }
        resolveDelay: 2000
        hitEffectDuration: 500
        effects: [{ type: damage, potency: 2400 }]

  mob_line:
    name: 直线突刺
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: toward_target }
        shape: { type: rect, length: 20, width: 3 }
        resolveDelay: 3000
        telegraphBefore: 3000
        hitEffectDuration: 400
        effects:
          - { type: damage, potency: 3400 }

  mob_scream:
    name: 绝命咆哮
    type: spell
    castTime: 5000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 99 }
        resolveDelay: 5000
        hitEffectDuration: 500
        effects:
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }
          - { type: damage, potency: 999999 }

  boss_fan_s:
    name: 前方斩击
    type: spell
    castTime: 3000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: fixed, angle: 180 }
        shape: { type: fan, radius: 15, angle: 120 }
        resolveDelay: 3000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 3600 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  boss_circle:
    name: 钢铁
    type: spell
    castTime: 4000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 8 }
        resolveDelay: 4000
        telegraphBefore: 4000
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 3600 }
          - { type: apply_buff, buffId: vulnerability, stacks: 10 }

  enrage:
    name: 时间的尽头
    type: spell
    castTime: 10000
    targetType: aoe
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 99 }
        resolveDelay: 10000
        hitEffectDuration: 500
        effects: [{ type: damage, potency: 999999999, dmgType: special }]

# --- 阶段定义 ---
phases:
  phase_default:
    trigger:
      on_start: true
    actions:
      # === P1: Boss 开场 (0-5s) ===
      - at: 0
        action: enable_ai

      # 5s: Boss 回中，全屏AOE
      - at: 5000
        action: disable_ai
      - at: 5000
        action: teleport
        position: { x: 0, y: 0 }
      - at: 5000
        action: lock_facing
        facing: 180
      - at: 5500
        use: arena_blast

      # === P2: Boss 离场，4小怪登场 (8s) ===
      - at: 8000
        action: set_visible
        value: false
      - at: 8000
        action: set_targetable
        value: false

      # NW (-7, 7)
      - at: 8500
        action: teleport
        entity: mob_nw
        position: { x: -7, y: 7 }
      - at: 8500
        action: set_visible
        entity: mob_nw
        value: true
      - at: 8500
        action: set_targetable
        entity: mob_nw
        value: true

      # NE (7, 7)
      - at: 8500
        action: teleport
        entity: mob_ne
        position: { x: 7, y: 7 }
      - at: 8500
        action: set_visible
        entity: mob_ne
        value: true
      - at: 8500
        action: set_targetable
        entity: mob_ne
        value: true

      # SE (7, -7)
      - at: 8500
        action: teleport
        entity: mob_se
        position: { x: 7, y: -7 }
      - at: 8500
        action: set_visible
        entity: mob_se
        value: true
      - at: 8500
        action: set_targetable
        entity: mob_se
        value: true

      # SW (-7, -7)
      - at: 8500
        action: teleport
        entity: mob_sw
        position: { x: -7, y: -7 }
      - at: 8500
        action: set_visible
        entity: mob_sw
        value: true
      - at: 8500
        action: set_targetable
        entity: mob_sw
        value: true

      # --- 小怪直线AOE循环: 每5s一轮 ---
      - at: 10000
        use: mob_line
        entity: mob_nw
      - at: 10000
        use: mob_line
        entity: mob_ne
      - at: 10000
        use: mob_line
        entity: mob_se
      - at: 10000
        use: mob_line
        entity: mob_sw

      - at: 15000
        use: mob_line
        entity: mob_nw
      - at: 15000
        use: mob_line
        entity: mob_ne
      - at: 15000
        use: mob_line
        entity: mob_se
      - at: 15000
        use: mob_line
        entity: mob_sw

      - at: 20000
        use: mob_line
        entity: mob_nw
      - at: 20000
        use: mob_line
        entity: mob_ne
      - at: 20000
        use: mob_line
        entity: mob_se
      - at: 20000
        use: mob_line
        entity: mob_sw

      - at: 25000
        use: mob_line
        entity: mob_nw
      - at: 25000
        use: mob_line
        entity: mob_ne
      - at: 25000
        use: mob_line
        entity: mob_se
      - at: 25000
        use: mob_line
        entity: mob_sw

      - at: 30000
        use: mob_line
        entity: mob_nw
      - at: 30000
        use: mob_line
        entity: mob_ne
      - at: 30000
        use: mob_line
        entity: mob_se
      - at: 30000
        use: mob_line
        entity: mob_sw

      - at: 35000
        use: mob_line
        entity: mob_nw
      - at: 35000
        use: mob_line
        entity: mob_ne
      - at: 35000
        use: mob_line
        entity: mob_se
      - at: 35000
        use: mob_line
        entity: mob_sw

      # === 绝命咆哮: 小怪出现后30s = 38.5s ===
      - at: 38500
        use: mob_scream
        entity: mob_nw
      - at: 38500
        use: mob_scream
        entity: mob_ne
      - at: 38500
        use: mob_scream
        entity: mob_se
      - at: 38500
        use: mob_scream
        entity: mob_sw

  # === Boss 复归阶段: 小怪全灭后触发 ===
  phase_boss_return:
    trigger:
      on_all_killed: { group: adds_wave1 }
    actions:
      # Boss 立即重new出现在场中央
      - at: 0
        action: set_visible
        value: true
      - at: 0
        action: set_targetable
        value: true
      - at: 0
        action: teleport
        position: { x: 0, y: 0 }
      - at: 0
        action: lock_facing
        facing: 180

      # 1s 后开始追击
      - at: 1000
        action: enable_ai

      # 每5s一次AOE轮转
      - at: 5000
        use: boss_fan_s
      - at: 10000
        use: boss_circle
      - at: 15000
        use: boss_fan_s
      - at: 20000
        use: boss_circle
      - at: 25000
        use: boss_fan_s
      - at: 30000
        use: boss_circle
      - at: 35000
        use: boss_fan_s
      - at: 40000
        use: boss_circle

      # 狂暴 (boss复归后60s)
      - at: 60000
        action: disable_ai
      - at: 60000
        action: teleport
        position: { x: 0, y: 0 }
      - at: 60000
        action: lock_facing
        facing: 180
      - at: 60500
        use: enrage
