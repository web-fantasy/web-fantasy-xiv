# 死区教学
# 长条矩形场地 10×40，致命边界（紫色外圈）
# 玩家出生在最南端，boss 在最北端（不可选中）
# 中间分布各种形状死区，玩家需穿越到达 boss
# 到达后 boss 变为可选中，玩家打一下即可通关
# 30s 狂暴：boss 释放超远击退，玩家被推出场外即死

arena:
  name: 死域教学
  shape: rect
  width: 10
  height: 40
  boundary: lethal
  deathZones:
    # 地图 x: -5~5, y: -20~20
    # 玩家从 y=-18 出发，boss 在 y=18
    # 每段死区之间留 ≥2m 宽的通路

    # ── 第1关：圆形挡路，从左侧绕过（左侧留3m口）──
    - id: circle_south
      center: { x: 1, y: -13 }
      shape: { type: circle, radius: 2.5 }

    # ── 第2关：右半区矩形墙，从左侧通过 ──
    #    覆盖 x:[-1,5] y:[-8,-2]，左侧留 4m 通路 x:[-5,-1]
    - id: rect_right_wall
      center: { x: 2, y: -8 }
      facing: 0
      shape: { type: rect, length: 6, width: 6 }

    # ── 第3关：左半区矩形墙，从右侧通过（迫使变道）──
    #    覆盖 x:[-5,1] y:[0,6]，右侧留 4m 通路 x:[1,5]
    - id: rect_left_wall
      center: { x: -2, y: 0 }
      facing: 0
      shape: { type: rect, length: 6, width: 6 }

    # ── 第4关：中央大圆，从左右边缘挤过 ──
    #    圆心 (0,9) 半径 3，左右各留 2m
    - id: circle_mid
      center: { x: 0, y: 9 }
      shape: { type: circle, radius: 3 }

    # ── 第5关：右侧矩形小墙，左侧留口到达boss ──
    #    覆盖 x:[0,5] y:[14,16]，左侧留 5m 通路
    - id: rect_north_wall
      center: { x: 2.5, y: 14 }
      facing: 0
      shape: { type: rect, length: 2, width: 5 }

entities:
  boss:
    type: boss
    group: boss
    hp: 1
    attack: 99999
    speed: 0
    size: 1
    facing: 180
    position: { x: 0, y: -15, z: 0 }  # starts near player, teleports north on combat start
    autoAttackRange: 0
    aggroRange: 0
    visible: true
    targetable: false   # 一开始不可选中

player:
  attack: 9999
  autoAttackRange: 3
  position: { x: 0, y: -18, z: 0 }

boss_ai:
  aggroRange: 999   # triggers combat immediately on scene load
  aggroAngle: 360

local_skills:
  enrage_knockback:
    name: 狂暴击退
    type: spell
    castTime: 5000
    targetType: aoe
    requiresTarget: false
    range: 0
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 50 }
        resolveDelay: 5000
        hitEffectDuration: 500
        effects:
          - { type: knockback, distance: 50, source: { type: caster } }
        displacementHint: knockback

skills: {}

timeline:
  # Boss teleports to north end after combat starts
  - at: 500
    action: teleport
    entity: boss
    position: { x: 0, y: 18 }
  - at: 1000
    action: lock_facing
    entity: boss
    facing: 180

  # Unlock boss after player has time to see the teleport
  - at: 3000
    action: set_targetable
    entity: boss
    value: true

  # 15s 狂暴，因为读条5s，所以在15s时才真正释放
  - at: 10000
    use: enrage_knockback
    entity: boss
