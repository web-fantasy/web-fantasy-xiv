id: mystic-stele
title: 神秘石碑
description: 一块古老的石碑刻满符文。触摸它或破坏它会带来不同后果。
options:
  - id: touch
    label: 触摸（-5 水晶 → +1 决心）
    requires:
      crystals: { $gte: 5 }
    outcomes:
      - { kind: crystals, delta: -5 }
      - { kind: determination, delta: 1 }
  - id: destroy
    label: 破坏（-1 决心 → +12 水晶）
    requires:
      determination: { $gte: 2 }
    outcomes:
      - { kind: determination, delta: -1 }
      - { kind: crystals, delta: 12 }
  - id: leave
    label: 离开
    outcomes: []
